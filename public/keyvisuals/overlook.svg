<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <filter id="glow-green" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="b2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="60" result="b3"/>
      <feMerge><feMergeNode in="b3"/><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-dim" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Fog effect -->
    <filter id="fog" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="4" seed="3" result="turb"/>
      <feColorMatrix in="turb" type="matrix" values="0 0 0 0 0.086  0 0 0 0 0.4  0 0 0 0 0.2  0 0 0 0.12 0" result="fog"/>
      <feBlend in="SourceGraphic" in2="fog" mode="screen"/>
    </filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch" result="n"/><feColorMatrix type="saturate" values="0" in="n" result="m"/><feBlend in="SourceGraphic" in2="m" mode="overlay"/></filter>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#081a10"/>
      <stop offset="50%" stop-color="#040d08"/>
      <stop offset="100%" stop-color="#020403"/>
    </radialGradient>
    <radialGradient id="mist" cx="50%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#166534" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="green-g" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#15803D"/>
      <stop offset="50%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532D"/>
    </linearGradient>
    <!-- Horizontal fog layers -->
    <linearGradient id="fog-band" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="40%" stop-color="#0a2618" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#0a2618" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="50%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#mist)"/>
  <!-- Fog bands -->
  <rect x="0" y="380" width="1920" height="200" fill="url(#fog-band)" filter="url(#fog)"/>
  <rect x="0" y="500" width="1920" height="150" fill="url(#fog-band)" opacity="0.5"/>
  <!-- Glow -->
  <text x="960" y="490" text-anchor="middle" font-family="Geist, sans-serif" font-size="180" letter-spacing="-4" filter="url(#glow-green)" opacity="0.45">
    <tspan font-weight="300" fill="transparent">Over</tspan><tspan font-weight="700" fill="#166534">look</tspan>
  </text>
  <!-- Over -->
  <text x="960" y="490" text-anchor="middle" font-family="Geist, sans-serif" font-size="180" letter-spacing="-4" filter="url(#glow-dim)">
    <tspan font-weight="300" fill="#1a2a1a">Over</tspan><tspan font-weight="700" fill="transparent">look</tspan>
  </text>
  <!-- look -->
  <text x="960" y="490" text-anchor="middle" font-family="Geist, sans-serif" font-size="180" letter-spacing="-4">
    <tspan font-weight="300" fill="transparent">Over</tspan><tspan font-weight="700" fill="url(#green-g)">look</tspan>
  </text>
  <text x="960" y="560" text-anchor="middle" font-family="Geist, sans-serif" font-size="16" font-weight="300" fill="#2a4a35" letter-spacing="5">BUSINESS STRATEGY</text>
  <text x="960" y="590" text-anchor="middle" font-family="Geist, sans-serif" font-size="13" font-weight="300" fill="#1a3020" letter-spacing="2" font-style="italic">Beyond default, in every direction.</text>
  <rect width="1920" height="1080" filter="url(#grain)" opacity="0.05"/>
  <rect width="1920" height="1080" fill="url(#vig)" opacity="0.5"/>
</svg>
